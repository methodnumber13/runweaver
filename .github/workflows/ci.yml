name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"
          cache: true

      - name: Format check
        run: test -z "$(gofmt -l $(find . -name '*.go' -not -path './.git/*'))"

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Coverage
        run: go test -cover ./...

      - name: Race
        run: go test -race ./...

      - name: Build
        run: go build ./cmd/runweaver

      - name: Vulnerability check
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
